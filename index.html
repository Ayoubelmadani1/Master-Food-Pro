<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Food | Cash Plus</title>
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --tg-blue: #0088cc; --orange: #ff6600; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; text-align: center; }
        .header { padding: 20px; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
        .menu-item { background: #2a2a2a; margin: 10px 0; padding: 15px; border-radius: 10px; border-right: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .price { color: var(--primary); font-weight: bold; }
        .order-btn { background: var(--primary); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .cart-section { background: #333; padding: 20px; border-radius: 10px; margin-top: 30px; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; background: #eee; }
        .payment-info { background: #444; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 0.9em; border: 1px dashed var(--orange); }
        .submit-btn { background: var(--tg-blue); color: white; width: 100%; padding: 15px; font-size: 1.1em; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍔 MASTER FOOD</h1>
        <p>اطلب الآن والدفع عبر Cash Plus أو عند الاستلام</p>
    </div>

    <div id="menu">
        <div class="menu-item">
            <div><h3>بيتزا مارغريتا</h3><span class="price">45 DH</span></div>
            <button class="order-btn" onclick="addToCart('بيتزا مارغريتا', 45)">إضافة +</button>
        </div>
        <div class="menu-item">
            <div><h3>طاكوس ميكس</h3><span class="price">35 DH</span></div>
            <button class="order-btn" onclick="addToCart('طاكوس ميكس', 35)">إضافة +</button>
        </div>
    </div>

    <div class="cart-section">
        <h2>🛒 سلة الطلبات</h2>
        <div id="cart-list" style="margin-bottom: 10px; font-weight: bold;">السلة فارغة</div>
        <p>المجموع: <span id="total-price" style="color: var(--primary); font-size: 1.5em;">0</span> DH</p>
        
        <input type="text" id="name" placeholder="أدخل اسمك الكامل">
        <input type="tel" id="phone" placeholder="أدخل رقم هاتفك">
        
        <label>طريقة الدفع:</label>
        <select id="payment-method" onchange="togglePaymentInfo()">
            <option value="الدفع عند الاستلام">الدفع عند الاستلام (COD)</option>
            <option value="Cash Plus">Cash Plus (كاش بلوس)</option>
        </select>

        <div id="cash-plus-info" class="payment-info" style="display:none;">
            🧡 أرسل المبلغ للحساب: <b>123456789</b> (بإسم: MASTER FOOD)
        </div>
        
        <button class="submit-btn" onclick="sendToTelegram()">تأكيد الطلب ✈️</button>
    </div>

    <script>
        let cart = [];
        let total = 0;

        const TELEGRAM_TOKEN = "7919932158:AAHcl9Nn9mGst8vA79rWvQ_H4WvW_H4WvW"; 
        const CHAT_ID = "7055004416";

        function addToCart(item, price) {
            cart.push(item);
            total += price;
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-list').innerText = cart.length > 0 ? cart.join(' + ') : "السلة فارغة";
            document.getElementById('total-price').innerText = total;
        }

        function togglePaymentInfo() {
            const method = document.getElementById('payment-method').value;
            document.getElementById('cash-plus-info').style.display = (method === 'Cash Plus') ? 'block' : 'none';
        }

        async function sendToTelegram() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const payment = document.getElementById('payment-method').value;

            if(!name || !phone || cart.length === 0) {
                alert("عفاك عمر معلوماتك واختار الماكلة!");
                return;
            }

            const message = `🍔 طلب جديد:\n👤 الإسم: ${name}\n📞 الهاتف: ${phone}\n🛒 الطلب: ${cart.join(', ')}\n💰 المجموع: ${total} DH\n💳 الدفع: ${payment}`;

            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;

            try {
                const response = await fetch(url);
                if(response.ok) {
                    alert("✅ تم إرسال طلبك! طريقة الدفع: " + payment);
                    cart = []; total = 0; updateUI(); 
                }
            } catch (error) { alert("❌ خطأ!"); }
        }
    </script>
</body>
  </html>
